<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#18324a">
  <title>{% block title %}No Fluff{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="{{ url_for('dashboard') }}">No Fluff</a>
    <span>Project delivery control</span>
  </nav>
  <main class="app-shell">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash flash-{{ category }}" role="status">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
